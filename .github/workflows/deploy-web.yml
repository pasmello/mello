name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/plugin-spec/**'
      - 'packages/registry-client/**'
      - 'packages/admin-core/**'
      - 'spec/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: apps/web
        env:
          PUBLIC_API_URL: https://registry.pasmello.com
          PUBLIC_PASMELLO_ORIGIN: https://pasmello.com
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/build --project-name=market-pasmello-com --branch=main
