name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r build
      - name: Test (api)
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://test
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: test
          S3_ACCESS_KEY_ID: test
          S3_SECRET_ACCESS_KEY: test
          CDN_BASE_URL: https://cdn.test
        run: pnpm test
      - name: Test (plugin-spec)
        working-directory: packages/plugin-spec
        run: pnpm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/cli
      - name: fmt
        working-directory: apps/cli
        run: cargo fmt -- --check
      - name: clippy
        working-directory: apps/cli
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        working-directory: apps/cli
        run: cargo test

  gitleaks:
    # Run the open-source gitleaks binary directly. The v2 GitHub Action
    # requires a paid license for organizations; the CLI itself stays MIT.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose
