name: release-cli

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  artifact: mello-linux-x64.tar.gz  }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, artifact: mello-linux-arm64.tar.gz, cross: true }
          - { os: macos-latest,   target: x86_64-apple-darwin,       artifact: mello-darwin-x64.tar.gz }
          - { os: macos-latest,   target: aarch64-apple-darwin,      artifact: mello-darwin-arm64.tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    artifact: mello-windows-x64.zip }

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for keyring (Linux native only)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: '!matrix.cross'
        working-directory: apps/cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        working-directory: apps/cli
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          cd apps/cli/target/${{ matrix.target }}/release
          tar czvf ../../../../${{ matrix.artifact }} mello

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd apps/cli/target/${{ matrix.target }}/release
          Compress-Archive -Path mello.exe -DestinationPath ../../../../${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build checksums manifest
        run: |
          mkdir -p dist
          for f in artifacts/*/mello-*; do
            cp "$f" dist/
          done
          cd dist
          sha256sum * > manifest.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
