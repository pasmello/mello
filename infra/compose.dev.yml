services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mello
      POSTGRES_PASSWORD: mello
      POSTGRES_DB: mello
    ports:
      - '5432:5432'
    volumes:
      - mello_pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - mello_minio_data:/data

  # One-shot that creates the packages bucket on startup. R2 in prod gets
  # the bucket via Terraform.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
        /usr/bin/mc mb --ignore-existing local/mello-packages;
        /usr/bin/mc anonymous set download local/mello-packages;
        exit 0;
      "

volumes:
  mello_pg_data:
  mello_minio_data:
